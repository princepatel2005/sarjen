<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <form id="calcForm">
        
        Enter Number 1:
        <input type="text" name="num1" placeholder="Enter number 1" />
        <br><br>
        Enter Number 2:
        <input type="text" name="num2" placeholder="Enter number 2" />
        <br><br>
        Result:
        <input type="text" name="output" placeholder="Result" readonly />
        <br><br>

        <input type="button" value="Add" onclick="addition()" />
        <input type="button" value="Subtract" onclick="subtraction()" />
        <input type="button" value="Multiply" onclick="multiplication()" />
        <input type="button" value="Divide" onclick="division()" />

    </form>

    <script>

        function addition() {
            var x = parseInt(calcForm.num1.value);
            var y = parseInt(calcForm.num2.value);
            var result = x + y;
            calcForm.output.value = result;
        }

        function subtraction() {
            var x = parseInt(calcForm.num1.value);
            var y = parseInt(calcForm.num2.value);
            var result = x - y;
            calcForm.output.value = result;
        }

        function multiplication() {
            var x = parseInt(calcForm.num1.value);
            var y = parseInt(calcForm.num2.value);
            var result = x * y;
            calcForm.output.value = result;
        }

        function division() {
            var x = parseInt(calcForm.num1.value);
            var y = parseInt(calcForm.num2.value);

            if (y == 0) {
                calcForm.output.value = "Can't divide by 0";
            } else {
                var result = x / y;
                calcForm.output.value = result;
            }
        }

    </script>

</body>
</html>
