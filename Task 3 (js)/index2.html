<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <form id="calcForm">
        
        Enter Number 1:
        <input type="text" name="num1" />
        <br><br>
        Enter Number 2:
        <input type="text" name="num2" />
        <br><br>
        Select Operator:
        <br><br>
        <input type="radio" id="addition" name="operation" />
        Addition
        <br>
        <input type="radio" id="subtraction" name="operation" />
        Subtraction
        <br>
        <input type="radio" id="multiplication" name="operation" />
        Multiplication
        <br>
        <input type="radio" id="division" name="operation" />
        Division
        <br><br>

        Result:
        <input type="text" name="output" readonly />
        <br><br>

        <input type="button" value="Answer" onclick="calculate()" />
    </form>

    <script>

        function calculate() {
            var x = calcForm.num1.value;
            var y = calcForm.num2.value;

            if (calcForm.addition.checked) {
                var result = parseInt(x) + parseInt(y);
                calcForm.output.value = result;
            }
            else if (calcForm.subtraction.checked) {
                var result = parseInt(x) - parseInt(y);
                calcForm.output.value = result;
            }
            else if (calcForm.multiplication.checked) {
                var result = parseInt(x) * parseInt(y);
                calcForm.output.value = result;
            }
            else if (calcForm.division.checked) {
                if (parseInt(y) == 0) {
                    calcForm.output.value = "Can't divide by 0";
                }
                else {
                    var result = parseInt(x) / parseInt(y);
                    calcForm.output.value = result;
                }
            }
            else {
                calcForm.output.value = "Select Valid Operator";
            }
        }
    </script>
    
</body>
</html>
