<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <form id="calcForm">

        Enter Number 1:
        <input type="text" name="num1" placeholder="Enter number 1" />
        <br><br>
        Enter Number 2:
        <input type="text" name="num2" placeholder="Enter number 2" />
        <br><br>
        Select Operator:
        <select name="operation">
            <option value="add">Addition</option>
            <option value="sub">Subtraction</option>
            <option value="mul">Multiplication</option>
            <option value="div">Division</option>
        </select>
        <br><br>

        Result:
        <input type="text" name="output" placeholder="Result" readonly />
        <br><br>

        <input type="button" value="Answer" onclick="calculate()" />

    </form>

    <script>

        function calculate() {
            var x = calcForm.num1.value;
            var y = calcForm.num2.value;

            if (calcForm.operation[0].selected) {
                var result = parseInt(x) + parseInt(y);
                calcForm.output.value = result;
            }
            else if (calcForm.operation[1].selected) {
                var result = parseInt(x) - parseInt(y);
                calcForm.output.value = result;
            }
            else if (calcForm.operation[2].selected) {
                var result = parseInt(x) * parseInt(y);
                calcForm.output.value = result;
            }
            else if (calcForm.operation[3].selected) {
                if (parseInt(y) == 0) {
                    calcForm.output.value = "Can't divide by 0";
                }
                else {
                    var result = parseInt(x) / parseInt(y);
                    calcForm.output.value = result;
                }
            }
            else {
                calcForm.output.value = "Select Valid Operator";
            }
        }

    </script>

</body>
</html>
    

</html>
