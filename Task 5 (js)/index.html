<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <form id="calcForm">

            Enter Number 1:
            <input type="text" name="num1" placeholder="Enter number 1" />
            <br><br>
            Enter Number 2:
            <input type="text" name="num2" placeholder="Enter number 2" />
            <br><br>
            Select Operator:
            <br><br>
            <input type="radio" id="addition" name="operation" />
            Addition
            <br>
            <input type="radio" id="subtraction" name="operation" />
            Subtraction
            <br>
            <input type="radio" id="multiplication" name="operation" />
            Multiplication
            <br>
            <input type="radio" id="division" name="operation" />
            Division
            <br><br>

            <input type="text" id="output" placeholder="Result" readonly />
            <input type="button" value="Answer" onclick="calculate()" />

        </form>
    </div>

    <script>

        function calculate() {

            var x = document.getElementsByName("num1")[0].value;
            var y = document.getElementsByName("num2")[0].value;
            if (isNaN(x) || isNaN(y)) {
                alert("Please enter valid numbers.");
            }
            else if (!x || !y) {
                alert("Please enter number.");
            }
            else if (document.getElementById("addition").checked) {
                var result = parseInt(x) + parseInt(y);
                document.getElementById("output").value = result;
            }
            else if (document.getElementById("subtraction").checked) {
                var result = parseInt(x) - parseInt(y);
                document.getElementById("output").value = result;
            }
            else if (document.getElementById("division").checked) {
                if (parseInt(y) == 0) {
                    alert("Can't divide by 0.");
                }
                else {
                    var result = parseInt(x) / parseInt(y);
                    document.getElementById("output").value = result;
                }
            }
            else if (document.getElementById("multiplication").checked) {
                var result = parseInt(x) * parseInt(y);
                document.getElementById("output").value = result;
            }
        }

    </script>

</body>
</html>
