<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <form id="calcForm">

        Enter Number 1:
        <input type="text" name="num1" placeholder="Enter number 1" />
        <br><br>
        Enter Number 2:
        <input type="text" name="num2" placeholder="Enter number 2" />
        <br><br>
        <!-- <input type="text" id="output" placeholder="Result" readonly /> -->
        <p id="output"></p>
        <br>

        <input type="button" value="Add" onclick="addition()">
        <input type="button" value="Sub" onclick="subtraction()">
        <input type="button" value="Mul" onclick="multiplication()">
        <input type="button" value="Div" onclick="division()">

    </form>
    
    <script>

        function addition() {

            var x = document.getElementsByName("num1")[0].value;
            var y = document.getElementsByName("num2")[0].value;
            if (isNaN(x) || isNaN(y)) {
                alert("Please enter valid numbers.");
            }
            else if (!x || !y) {
                alert("Please enter number.");
            }
            else {
                var result = parseInt(x) + parseInt(y);
                document.getElementById("output").innerText = result;
            }
        }

        function subtraction() {
            
            var x = document.getElementsByName("num1")[0].value;
            var y = document.getElementsByName("num2")[0].value;
            if (isNaN(x) || isNaN(y)) {
                alert("Please enter valid numbers.");
            }
            else if (!x || !y) {
                alert("Please enter number.");
            }
            else {
                var result = parseInt(x) - parseInt(y);
                document.getElementById("output").innerText = result;
            }
        }

        function multiplication() {

            var x = document.getElementsByName("num1")[0].value;
            var y = document.getElementsByName("num2")[0].value;
            if (isNaN(x) || isNaN(y)) {
                alert("Please enter valid numbers.");
            }
            else if (!x || !y) {
                alert("Please enter number.");
            }
            else {
                var result = parseInt(x) * parseInt(y);
                document.getElementById("output").innerText = result;
            }
        }

        function division() {

            var x = document.getElementsByName("num1")[0].value;
            var y = document.getElementsByName("num2")[0].value;
            if (isNaN(x) || isNaN(y)) {
                alert("Please enter valid numbers.");
            }
            else if (!x || !y) {
                alert("Please enter number.");
            }
            else {
                if (y == 0) {
                    alert("Can't divide by 0");
                }
                else {
                    var result = parseInt(x) / parseInt(y);
                    document.getElementById("output").innerText = result;
                }
            }
        }

    </script>

</body>
</html>
