<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <form id="calcForm">

        Enter Number 1:
        <input type="text" name="num1" placeholder="Enter number 1" />
        <br><br>
        Enter Number 2:
        <input type="text" name="num2" placeholder="Enter number 2" />
        <br><br>

        Select Operator:
        <select name="operation">
            <option value="add">Addition</option>
            <option value="sub">Subtraction</option>
            <option value="mul">Multiplication</option>
            <option value="div">Division</option>
        </select>
        <br><br>

        <p name="output"></p>

        <input type="button" value="Answer" onclick="calculate()" />

    </form>

    <script>

        function calculate() {

            var x = document.getElementsByName("num1")[0].value;
            var y = document.getElementsByName("num2")[0].value;
            if (isNaN(x) || isNaN(y)) {
                alert("Please enter valid numbers.");
            }
            else if (!x || !y) {
                alert("Please enter number.");
            }
            else if (document.getElementsByName("operation")[0].selectedIndex == 0) {
                var result = parseInt(x) + parseInt(y);
                document.getElementsByName("output")[0].innerText = result;
            }
            else if (document.getElementsByName("operation")[0].selectedIndex == 1) {
                var result = parseInt(x) - parseInt(y);
                document.getElementsByName("output")[0].innerText = result;
            }
            else if (document.getElementsByName("operation")[0][3].selected) {
                if (parseInt(y) == 0) {
                    alert("Can't divide by 0");
                }
                else {
                    var result = parseInt(x) / parseInt(y);
                    document.getElementsByName("output")[0].innerText = result;
                }
            }
            else if (document.getElementsByName("operation")[0][2].selected) {
                var result = parseInt(x) * parseInt(y);
                document.getElementsByName("output")[0].innerText = result;
            }
        }

    </script>

</body>
</html>
