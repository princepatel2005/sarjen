<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Calculator</title>
</head>
<body>
    <div class="container">

        <h2>GST Calculator</h2>

        Amount:
        <input type="text" name="amountInput" placeholder="Enter Amount" />
        <br><br>
        GST:
        <select name="gstRate">
            <option value="0.03">3%</option>
            <option value="0.05">5%</option>
            <option value="0.18">18%</option>
            <option value="0.40">40%</option>
        </select>
        <br><br>
        Tax Type:
        <select name="taxType">
            <option value="exclusive">Exclusive</option>
            <option value="inclusive">Inclusive</option>
        </select>
        <br><br>
        Original Amount:
        <p id="baseAmount"></p>
        
        GST Amount (SGST + CGST):
        <p id="gstOutput"></p>

        Final Amount:
        <p id="finalAmount"></p>

        <button type="button" onclick="calculateGST()">Result</button>

    </div>
</body>

<script>

    function calculateGST() {

        var amount = document.getElementsByName("amountInput")[0].value;
        var gstIndex = document.getElementsByName("gstRate")[0].selectedIndex;
        var gstValue = document.getElementsByName("gstRate")[0][gstIndex].value;

        var taxSelect = document.getElementsByName("taxType")[0];

        // Exclusive GST
        if (taxSelect[0].selected == true) {

            var gstAmount = parseFloat(amount) * gstValue;
            var totalAmount = parseFloat(amount) + gstAmount;

            document.getElementById("baseAmount").innerText = amount;
            document.getElementById("gstOutput").innerHTML =
                `${gstAmount} (CGST: ${gstAmount / 2} SGST: ${gstAmount / 2})`;
            document.getElementById("finalAmount").innerText = totalAmount;
            document.getElementById("finalAmount").style.color = "red";
        }

        // Inclusive GST
        else if (taxSelect[1].selected == true) {

            var originalAmount = parseFloat(amount) / (1 + parseFloat(gstValue));
            var totalAmount = parseFloat(amount);
            var gstAmount = totalAmount - originalAmount;

            document.getElementById("baseAmount").innerText = originalAmount;
            document.getElementById("gstOutput").innerText =
                `${gstAmount} (CGST: ${gstAmount / 2} SGST: ${gstAmount / 2})`;
            document.getElementById("finalAmount").innerText = totalAmount;
            document.getElementById("finalAmount").style.color = "red";
        }
    }

</script>
    
</html>
